services:
  z7pdf:
    command: npm run dev
    environment:
      NODE_ENV: development
    volumes:
      - ./data:/app/data
      - ./server.js:/app/server.js
      - ./db.js:/app/db.js
      - ./public:/app/public
      - ./routes:/app/routes
      - ./services:/app/services
      - ./middleware:/app/middleware
      - ./utils:/app/utils
